<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Point Cloud Web Viewer</title>
  <style>
    :root {
      --bg: #0c1117;
      --panel: rgba(16, 24, 32, 0.88);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #e7eef7;
      --muted: #8ba0b5;
      --accent: #52d6b5;
      --accent-2: #6ab8ff;
      --danger: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(60, 100, 140, 0.25), transparent 35%),
        linear-gradient(180deg, #0c1117 0%, #06090d 100%);
      color: var(--text);
      font-family: "SFMono-Regular", "Consolas", "Liberation Mono", monospace;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100%;
    }

    .sidebar {
      padding: 20px;
      background: var(--panel);
      border-right: 1px solid var(--panel-border);
      backdrop-filter: blur(14px);
      overflow: auto;
    }

    .viewer {
      position: relative;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }

    canvas.dragging {
      cursor: grabbing;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.2;
    }

    p, li, label, button, input, select {
      font-size: 13px;
      line-height: 1.6;
    }

    .muted {
      color: var(--muted);
    }

    .section {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--panel-border);
    }

    .row {
      margin-bottom: 12px;
    }

    .row label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
    }

    input[type="range"],
    select,
    input[type="text"] {
      width: 100%;
    }

    input[type="range"] {
      accent-color: var(--accent);
    }

    input[type="text"],
    select {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--panel-border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 8px;
    }

    button {
      width: 100%;
      margin-top: 8px;
      padding: 10px 12px;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #051018;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid var(--panel-border);
    }

    .chips {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .chip {
      padding: 10px 12px;
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
    }

    .chip strong {
      display: block;
      font-size: 16px;
      color: var(--accent);
    }

    .status {
      position: absolute;
      left: 18px;
      bottom: 18px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(5, 10, 15, 0.72);
      border: 1px solid var(--panel-border);
      color: var(--muted);
      backdrop-filter: blur(10px);
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--panel-border);
      }

      .viewer {
        min-height: 60vh;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>Point Cloud Viewer</h1>
      <p class="muted">
        服务器端生成点云 JSON，本地浏览器通过 SSH 端口转发访问。
        鼠标左键拖动旋转，滚轮缩放，双击重置视角。
      </p>

      <div class="section">
        <div class="row">
          <label for="pointcloudPath">点云路径（服务器端）</label>
          <input id="pointcloudPath" type="text" value="/home/lingzhiying/learn/learn_pcl/data/kitti/training/velodyne/000000.bin">
        </div>
        <div class="row">
          <label for="voxelLeafSize">体素尺寸 x,y,z（米）</label>
          <input id="voxelLeafSize" type="text" value="0.2,0.2,0.2" placeholder="例如 0.2,0.2,0.2">
        </div>
        <div class="row">
          <label for="xRange">X 范围 min,max（前后，米）</label>
          <input id="xRange" type="text" value="" placeholder="留空表示不过滤，例如 -10,60">
        </div>
        <div class="row">
          <label for="yRange">Y 范围 min,max（左右，米）</label>
          <input id="yRange" type="text" value="" placeholder="留空表示不过滤，例如 -20,20">
        </div>
        <div class="row">
          <label for="zRange">Z 范围 min,max（高低，米）</label>
          <input id="zRange" type="text" value="" placeholder="留空表示不过滤，例如 -3,2">
        </div>
        <div class="row">
          <label for="dataPath">JSON 路径（HTTP）</label>
          <input id="dataPath" type="text" value="/output/kitti_000000_web.json">
        </div>
        <button id="convertButton">转换并加载点云</button>
        <button id="reloadButton" class="secondary">仅重新加载 JSON</button>
      </div>

      <div class="section">
        <div class="row">
          <label for="colorMode">颜色模式</label>
          <select id="colorMode">
            <option value="intensity">按强度</option>
            <option value="height">按高度</option>
            <option value="depth">按距离</option>
            <option value="white">纯白</option>
          </select>
        </div>
        <div class="row">
          <label for="pointSize">点大小</label>
          <input id="pointSize" type="range" min="1" max="5" step="1" value="2">
        </div>
        <div class="row">
          <label for="pointAlpha">点透明度</label>
          <input id="pointAlpha" type="range" min="0.2" max="1" step="0.05" value="0.8">
        </div>
        <button id="resetButton" class="secondary">重置视角</button>
      </div>

      <div class="section">
        <div class="chips">
          <div class="chip">
            <span class="muted">点数</span>
            <strong id="pointCount">0</strong>
          </div>
          <div class="chip">
            <span class="muted">范围</span>
            <strong id="boundsText">-</strong>
          </div>
        </div>
      </div>
    </aside>

    <main class="viewer">
      <canvas id="canvas"></canvas>
      <div id="status" class="status">等待加载点云...</div>
    </main>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const pointcloudPathInput = document.getElementById("pointcloudPath");
    const voxelLeafSizeInput = document.getElementById("voxelLeafSize");
    const xRangeInput = document.getElementById("xRange");
    const yRangeInput = document.getElementById("yRange");
    const zRangeInput = document.getElementById("zRange");
    const dataPathInput = document.getElementById("dataPath");
    const pointCountEl = document.getElementById("pointCount");
    const boundsTextEl = document.getElementById("boundsText");
    const pointSizeEl = document.getElementById("pointSize");
    const pointAlphaEl = document.getElementById("pointAlpha");
    const colorModeEl = document.getElementById("colorMode");

    const state = {
      points: [],
      meta: null,
      yaw: Math.PI * 0.25,
      pitch: -0.55,
      distance: 85,
      target: { x: 0, y: 0, z: 0 },
      dragging: false,
      lastX: 0,
      lastY: 0
    };

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle("error", isError);
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      render();
    }

    function readQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function formatRangeInput(range) {
      if (!Array.isArray(range) || range.length !== 2) {
        return "";
      }
      return `${range[0]},${range[1]}`;
    }

    function lerpColor(a, b, t) {
      return [
        Math.round(a[0] + (b[0] - a[0]) * t),
        Math.round(a[1] + (b[1] - a[1]) * t),
        Math.round(a[2] + (b[2] - a[2]) * t)
      ];
    }

    function computeColor(point, meta) {
      const mode = colorModeEl.value;
      if (!meta) {
        return "rgba(255,255,255,0.8)";
      }

      const alpha = Number(pointAlphaEl.value);
      if (mode === "white") {
        return `rgba(240,245,250,${alpha})`;
      }

      const [minX, maxX] = meta.bounds.x;
      const [minZ, maxZ] = meta.bounds.z;
      const distance = Math.sqrt(point.x * point.x + point.y * point.y + point.z * point.z);
      let t = 0;

      if (mode === "height") {
        t = clamp((point.z - minZ) / Math.max(1e-6, maxZ - minZ), 0, 1);
      } else if (mode === "depth") {
        t = clamp(distance / Math.max(1e-6, maxX - minX), 0, 1);
      } else {
        t = clamp(point.intensity, 0, 1);
      }

      const rgb = lerpColor([73, 103, 255], [97, 255, 181], t);
      return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${alpha})`;
    }

    function transformPoint(point) {
      const dx = point.x - state.target.x;
      const dy = point.y - state.target.y;
      const dz = point.z - state.target.z;

      const cosYaw = Math.cos(-state.yaw);
      const sinYaw = Math.sin(-state.yaw);
      const x1 = dx * cosYaw - dy * sinYaw;
      const y1 = dx * sinYaw + dy * cosYaw;
      const z1 = dz;

      const cosPitch = Math.cos(-state.pitch);
      const sinPitch = Math.sin(-state.pitch);
      const x2 = x1 * cosPitch + z1 * sinPitch;
      const y2 = y1;
      const z2 = -x1 * sinPitch + z1 * cosPitch;

      return {
        x: y2,
        y: -z2,
        z: x2 + state.distance
      };
    }

    function renderAxes() {
      const axisLen = 8;
      const axes = [
        { p: { x: axisLen, y: 0, z: 0 }, color: "rgba(255,99,99,0.9)" },
        { p: { x: 0, y: axisLen, z: 0 }, color: "rgba(99,255,163,0.9)" },
        { p: { x: 0, y: 0, z: axisLen }, color: "rgba(99,174,255,0.9)" }
      ];
      const origin = projectPoint({ x: 0, y: 0, z: 0 }, false);
      if (!origin) {
        return;
      }
      for (const axis of axes) {
        const tip = projectPoint(axis.p, false);
        if (!tip) {
          continue;
        }
        ctx.strokeStyle = axis.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(origin.x, origin.y);
        ctx.lineTo(tip.x, tip.y);
        ctx.stroke();
      }
    }

    function projectPoint(point, useTarget = true) {
      const transformed = useTarget ? transformPoint(point) : transformPoint({
        x: point.x + state.target.x,
        y: point.y + state.target.y,
        z: point.z + state.target.z
      });
      if (transformed.z <= 0.1) {
        return null;
      }

      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      const focal = Math.min(width, height) * 0.8;
      return {
        x: width * 0.5 + (transformed.x / transformed.z) * focal,
        y: height * 0.5 + (transformed.y / transformed.z) * focal,
        depth: transformed.z
      };
    }

    function render() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      ctx.clearRect(0, 0, width, height);

      ctx.fillStyle = "#071018";
      ctx.fillRect(0, 0, width, height);

      if (!state.points.length) {
        return;
      }

      const projected = [];
      for (const point of state.points) {
        const screen = projectPoint(point);
        if (!screen) {
          continue;
        }
        projected.push({ point, screen });
      }

      projected.sort((a, b) => b.screen.depth - a.screen.depth);

      renderAxes();

      const pointSize = Number(pointSizeEl.value);
      for (const item of projected) {
        ctx.fillStyle = computeColor(item.point, state.meta);
        ctx.fillRect(item.screen.x, item.screen.y, pointSize, pointSize);
      }
    }

    function resetView(meta) {
      const bounds = meta?.bounds || { x: [-10, 50], y: [-20, 20], z: [-3, 3] };

      // 自动驾驶场景下更常见的“坐标中心”是传感器原点 (0, 0, 0)，
      // 而不是整片点云的包围盒中心。这样坐标轴和自车位置更符合直觉。
      state.target = { x: 0, y: 0, z: 0 };

      // 相机距离使用点云最大半径估算，既保证能看到整体范围，
      // 也避免因为点云大多在前方而导致默认视角太近。
      const maxAbsX = Math.max(Math.abs(bounds.x[0]), Math.abs(bounds.x[1]));
      const maxAbsY = Math.max(Math.abs(bounds.y[0]), Math.abs(bounds.y[1]));
      const maxAbsZ = Math.max(Math.abs(bounds.z[0]), Math.abs(bounds.z[1]));
      state.distance = Math.max(45, Math.max(maxAbsX, maxAbsY, maxAbsZ) * 1.6);
      state.yaw = Math.PI * 0.22;
      state.pitch = -0.6;
      render();
    }

    async function loadPointCloud(path) {
      setStatus(`正在加载 ${path} ...`);
      try {
        const response = await fetch(path, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const payload = await response.json();
        const raw = payload.points || [];
        const points = [];
        for (let i = 0; i + 3 < raw.length; i += 4) {
          points.push({
            x: raw[i],
            y: raw[i + 1],
            z: raw[i + 2],
            intensity: raw[i + 3]
          });
        }

        state.points = points;
        state.meta = {
          rawPointCount: payload.meta?.raw_point_count || points.length,
          filteredPointCount: payload.meta?.filtered_point_count || points.length,
          pointCount: payload.meta?.point_count || points.length,
          bounds: payload.meta?.bounds || { x: [0, 1], y: [0, 1], z: [0, 1] },
          voxelLeafSize: payload.meta?.voxel_leaf_size || null,
          rangeFilter: payload.meta?.range_filter || null
        };

        pointCountEl.textContent = String(state.meta.pointCount);
        boundsTextEl.textContent =
          `x:${state.meta.bounds.x[0].toFixed(1)}..${state.meta.bounds.x[1].toFixed(1)}m`;

        if (Array.isArray(state.meta.voxelLeafSize) && state.meta.voxelLeafSize.length === 3) {
          voxelLeafSizeInput.value = state.meta.voxelLeafSize.join(",");
        }
        if (state.meta.rangeFilter) {
          xRangeInput.value = formatRangeInput(state.meta.rangeFilter.x);
          yRangeInput.value = formatRangeInput(state.meta.rangeFilter.y);
          zRangeInput.value = formatRangeInput(state.meta.rangeFilter.z);
        }

        resetView(state.meta);
        setStatus(
          `已加载 ${state.meta.pointCount} 个点（原始 ${state.meta.rawPointCount}，裁剪后 ${state.meta.filteredPointCount}）`
        );
      } catch (error) {
        console.error(error);
        setStatus(`加载失败: ${error.message}`, true);
      }
    }

    async function convertAndLoadPointCloud(pointcloudPath) {
      const path = pointcloudPath.trim();
      if (!path) {
        setStatus("点云路径不能为空", true);
        return;
      }

      setStatus(`正在转换 ${path} ...`);
      try {
        const response = await fetch("/api/convert", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            pointcloud_path: path,
            voxel_leaf_size: voxelLeafSizeInput.value.trim(),
            x_range: xRangeInput.value.trim(),
            y_range: yRangeInput.value.trim(),
            z_range: zRangeInput.value.trim()
          })
        });

        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          const message = payload.stderr || payload.stdout || `HTTP ${response.status}`;
          throw new Error(message);
        }

        dataPathInput.value = payload.json_path;
        await loadPointCloud(payload.json_path);
      } catch (error) {
        console.error(error);
        setStatus(`转换失败: ${error.message}`, true);
      }
    }

    canvas.addEventListener("mousedown", (event) => {
      state.dragging = true;
      state.lastX = event.clientX;
      state.lastY = event.clientY;
      canvas.classList.add("dragging");
    });

    window.addEventListener("mouseup", () => {
      state.dragging = false;
      canvas.classList.remove("dragging");
    });

    window.addEventListener("mousemove", (event) => {
      if (!state.dragging) {
        return;
      }
      const dx = event.clientX - state.lastX;
      const dy = event.clientY - state.lastY;
      state.lastX = event.clientX;
      state.lastY = event.clientY;
      state.yaw += dx * 0.008;
      state.pitch = clamp(state.pitch + dy * 0.008, -1.45, 1.45);
      render();
    });

    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      const delta = event.deltaY > 0 ? 1.08 : 0.92;
      state.distance = clamp(state.distance * delta, 5, 300);
      render();
    }, { passive: false });

    canvas.addEventListener("dblclick", () => resetView(state.meta));

    document.getElementById("reloadButton").addEventListener("click", () => {
      loadPointCloud(dataPathInput.value.trim());
    });
    document.getElementById("convertButton").addEventListener("click", () => {
      convertAndLoadPointCloud(pointcloudPathInput.value);
    });
    document.getElementById("resetButton").addEventListener("click", () => {
      resetView(state.meta);
    });
    colorModeEl.addEventListener("change", render);
    pointSizeEl.addEventListener("input", render);
    pointAlphaEl.addEventListener("input", render);
    window.addEventListener("resize", resizeCanvas);

    const queryPath = readQueryParam("data");
    if (queryPath) {
      dataPathInput.value = queryPath;
    }

    resizeCanvas();
    loadPointCloud(dataPathInput.value.trim());
  </script>
</body>
</html>
